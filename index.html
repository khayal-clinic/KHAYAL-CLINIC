<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a2f28">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KHAYAL CLINIC">
    <meta name="description" content="KHAYAL CLINIC - Electronic Medical Records System">
    <meta name="keywords" content="clinic, medical, EMR, patient records">
    <meta name="author" content="KHAYAL CLINIC">
    <title>KHAYAL CLINIC - EMR System</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- JsBarcode library for CODE 128 -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #0b2b26 0%, #1a4d44 100%);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .clinic-header {
            background: #0a2f28;
            color: #f7eac5;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-left img, .header-right img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }
        .clinic-title {
            text-align: center;
            flex: 1;
        }
        .clinic-title h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .clinic-title p {
            margin: 4px 0 0;
            opacity: 0.8;
            font-size: 10px;
        }
        .barcode-section {
            background: #f8f6f0;
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2dccd;
        }
        .barcode-container {
            display: inline-block;
            background: white;
            padding: 8px 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .barcode-container svg {
            max-width: 100%;
            height: auto;
        }
        .barcode-text {
            font-family: monospace;
            font-size: 12px;
            margin-top: 5px;
            color: #1e5a4c;
            font-weight: bold;
        }
        .file-no-area {
            background: #f0ede5;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            color: #1e5a4c;
            text-align: center;
            min-width: 150px;
        }
        .form-container {
            padding: 15px 20px 25px;
        }
        h2, h3 {
            color: #1e5a4c;
            border-left: 5px solid #c2a15b;
            padding-left: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .form-section {
            display: none;
            animation: fadeSlide 0.3s ease;
        }
        .form-section.active {
            display: block;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
        }
        .field {
            flex: 1;
            min-width: 150px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #1d3e3a;
            font-size: 12px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #cbddd8;
            border-radius: 16px;
            font-size: 14px;
            background: #fefef7;
        }
        .checkbox-group {
            background: #f8f6f0;
            padding: 12px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2dccd;
        }
        .checkbox-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            max-height: 250px;
            overflow-y: auto;
        }
        .checkbox-grid label {
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 5px 12px;
            border-radius: 30px;
            border: 1px solid #cad2cd;
            cursor: pointer;
            font-size: 12px;
        }
        .pmh-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .no-pmh-check {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 5px 12px;
            border-radius: 30px;
            border: 1px solid #cad2cd;
            font-size: 12px;
        }
        .yesno-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin: 10px 0 5px;
        }
        .yesno-group label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            font-size: 13px;
        }
        .detail-text {
            margin-top: 8px;
            margin-bottom: 15px;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: transparent;
            color: #1e5a4c;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 0;
            flex: 1;
            min-width: 80px;
        }
        button:hover {
            transform: scale(1.02);
        }
        .main-page-btn, .add-row-btn {
            background: #1e5a4c;
            color: white;
            border-radius: 30px;
            padding: 8px 16px;
        }
        .required-star {
            color: #c0392b;
            margin-left: 3px;
        }
        .treatment-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            font-size: 12px;
        }
        .treatment-table th, .treatment-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .treatment-table th {
            background-color: #1e5a4c;
            color: white;
            font-weight: 600;
        }
        .treatment-table td input {
            border: 1px solid #cbddd8;
            border-radius: 10px;
            padding: 6px;
            width: 100%;
            font-size: 12px;
        }
        .remove-row-btn {
            background: #b3413b;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 11px;
        }
        .page {
            display: none;
        }
        .page.active-page {
            display: block;
        }
        .search-page {
            background: #f1f4ef;
            min-height: 400px;
            border-radius: 24px;
            padding: 15px;
        }
        .patient-card {
            background: white;
            border-radius: 18px;
            padding: 12px 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border-right: 4px solid #c2a15b;
        }
        .patient-barcode {
            background: #f8f6f0;
            padding: 6px 10px;
            border-radius: 12px;
            margin-bottom: 8px;
            text-align: center;
        }
        .patient-barcode svg {
            max-width: 130px;
            height: auto;
        }
        .visit-card {
            background: #faf8f0;
            border-radius: 14px;
            padding: 10px 12px;
            margin: 8px 0 8px 15px;
            border-left: 3px solid #c2a15b;
            font-size: 12px;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin: 0 3px;
            padding: 4px 8px;
            display: inline-block;
        }
        .search-area {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
            gap: 10px;
        }
        .file-link {
            display: inline-block;
            background: #1e5a4c;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 11px;
            margin-top: 5px;
        }
        .id-label {
            font-weight: bold;
            color: #1e5a4c;
            font-size: 12px;
        }
        .offline-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #b3413b;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 1000;
        }
        .install-btn {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: #1e5a4c;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: none;
        }
        @media (max-width: 700px) {
            .form-container { padding: 12px 15px; }
            .buttons button { padding: 8px 12px; font-size: 13px; }
            .clinic-header { padding: 12px 15px; }
            .checkbox-grid label { font-size: 11px; padding: 4px 10px; }
            .install-btn { padding: 6px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="clinic-header">
        <div class="header-left"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23c2a15b'/%3E%3Ctext x='50' y='67' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3E🩺%3C/text%3E%3C/svg%3E" alt="icon"></div>
        <div class="clinic-title"><h1>KHAYAL CLINIC</h1><p>Electronic Medical Records | BNF Treatment Plan</p></div>
        <div class="header-right"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23c2a15b'/%3E%3Ctext x='50' y='67' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3E🏥%3C/text%3E%3C/svg%3E" alt="icon"></div>
    </div>
    
    <div class="form-container">
        <!-- MAIN PAGE -->
        <div id="mainPage" class="page active-page">
            <div class="barcode-section">
                <div class="barcode-container">
                    <svg id="barcode"></svg>
                    <div class="barcode-text" id="barcodeFileNo">KHC-0001</div>
                </div>
            </div>
            
            <div class="header-flex">
                <div style="font-weight: bold; color:#1e5a4c;">PATIENT INFORMATION</div>
                <div class="file-no-area">📄 FILE NO: <span id="fileNumberDisplay">KHC-0001</span></div>
            </div>
            
            <div id="step1" class="form-section active">
                <div class="row">
                    <div class="field"><label>📅 DATE <span class="required-star">*</span></label><input type="date" id="date" required></div>
                    <div class="field"><label>👤 FULL NAME <span class="required-star">*</span></label><input type="text" id="name" placeholder=" " required></div>
                    <div class="field"><label>🎂 AGE <span class="required-star">*</span></label><input type="text" id="age" placeholder=" " required></div>
                </div>
                <div class="row">
                    <div class="field"><label>🏠 RESIDENCE <span class="required-star">*</span></label><input type="text" id="address" placeholder=" " required></div>
                    <div class="field"><label>💍 MARITAL STATUS <span class="required-star">*</span></label><select id="marital"><option value="">-- Select --</option><option value="Married">Married</option><option value="Single">Single</option></select></div>
                    <div class="field"><label>💼 OCCUPATION <span class="required-star">*</span></label><select id="job"><option value="">-- Select --</option><option value="Employed">Employed</option><option value="Self-employed">Self-employed</option><option value="Unemployed">Unemployed</option></select></div>
                </div>
                <div class="buttons">
                    <button onclick="clearAllData()">🗑️ CLEAR ALL</button>
                    <button onclick="showSearchPage()">🔍 SEARCH</button>
                    <button onclick="validateAndNext()">➡️ NEXT</button>
                </div>
            </div>

            <div id="step2" class="form-section">
                <h2>CLINICAL HISTORY - NEW VISIT</h2>
                <div class="checkbox-group">
                    <label style="font-weight: bold;">📖 HISTORY OF PRESENTING ILLNESS</label>
                    <div id="hpiContainer"></div>
                </div>
                <div class="field"><label>✏️ OTHER COMPLAINTS</label><textarea id="otherCO" rows="2" placeholder=" "></textarea></div>
                
                <div class="checkbox-group">
                    <div class="pmh-header">
                        <label style="font-weight: bold;">📋 PAST MEDICAL HISTORY</label>
                        <label class="no-pmh-check"><input type="checkbox" id="pmhNoCheckbox"> No Past Medical History</label>
                    </div>
                    <div id="pmhContainer" class="checkbox-grid"></div>
                </div>
                
                <div><label>👨‍👩‍👧‍👦 FAMILY HISTORY</label>
                    <div class="yesno-group"><label><input type="radio" name="fhExist" value="Yes"> Yes</label><label><input type="radio" name="fhExist" value="No" checked> No</label></div>
                    <div class="detail-text"><textarea id="fhDetails" rows="2" placeholder=" "></textarea></div>
                </div>
                
                <div><label>💊 DRUGS HISTORY</label>
                    <div class="yesno-group"><label><input type="radio" name="dhExist" value="Yes"> Yes</label><label><input type="radio" name="dhExist" value="No" checked> No</label></div>
                    <div class="detail-text"><textarea id="dhDetails" rows="2" placeholder=" "></textarea></div>
                </div>
                <div class="buttons"><button onclick="prevStep(1)">🔙 BACK</button><button onclick="nextStep(3)">➡️ NEXT</button></div>
            </div>

            <div id="step3" class="form-section">
                <h2>🔬 INVESTIGATIONS</h2>
                <div class="checkbox-group">
                    <label style="font-weight: bold;">🩻 SELECT INVESTIGATIONS</label>
                    <div id="investigationsContainer" class="checkbox-grid"></div>
                </div>
                
                <div class="field" style="margin-bottom: 20px;">
                    <label>📝 OTHER INVESTIGATION</label>
                    <textarea id="otherInvestigation" rows="2" placeholder=" "></textarea>
                </div>
                
                <div class="field" style="margin-bottom: 25px;">
                    <label>📎 ATTACHMENT</label>
                    <input type="file" id="investFile" accept="image/*,application/pdf">
                    <div id="fileNameDisplay" style="margin-top: 5px; font-size: 12px; color: #5f6c5a;"></div>
                </div>

                <h2>💊 TREATMENT PLAN</h2>
                <div style="margin-bottom: 15px;">
                    <button type="button" class="add-row-btn" onclick="addTreatmentRow()">+ Add Medication</button>
                </div>
                <table class="treatment-table" id="treatmentTable">
                    <thead><tr><th>Drug / Medication</th><th>Dose</th><th>Duration</th><th style="width: 50px;">Action</th></tr></thead>
                    <tbody id="treatmentTableBody"></tbody>
                </table>
                <datalist id="drugList"></datalist>
                
                <div class="buttons"><button onclick="prevStep(2)">🔙 BACK</button><button onclick="saveCurrentVisit()">💾 SAVE VISIT</button></div>
            </div>
        </div>

        <!-- SEARCH PAGE -->
        <div id="searchPage" class="page">
            <div class="search-page">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
                    <h2 style="margin:0;">📋 REGISTERED PATIENTS</h2>
                    <button class="main-page-btn" onclick="showMainPage()">🏠 MAIN PAGE</button>
                </div>
                <div class="search-area">
                    <input type="text" id="globalSearch" placeholder="🔍 Search by name, file number or date..." onkeyup="renderFullPatientsList()" style="flex:1; background:white;">
                </div>
                <div id="fullPatientsList">Loading...</div>
            </div>
        </div>
    </div>
</div>

<button id="installButton" class="install-btn" style="display: none;">📲 Install App</button>
<div id="offlineBadge" class="offline-badge" style="display: none;">📡 Offline Mode</div>

<script>
    // ======================= SYMPTOMS LISTS =======================
    const generalSymptoms = ["Headache", "Dizziness", "General fatigue", "Fever", "Weight changes", "Night sweats"];
    const respiratorySymptoms = ["Cough", "Shortness of breath", "Wheezing", "Chest tightness", "Sputum production", "Hemoptysis"];
    const digestiveSymptoms = ["Nausea", "Vomiting", "Diarrhea", "Constipation", "Abdominal pain", "Bloating", "Heartburn", "Loss of appetite"];
    const urinarySymptoms = ["Dysuria", "Frequent urination", "Urgency", "Nocturia", "Hematuria", "Cloudy urine", "Foul smelling urine", "Incontinence", "Difficulty starting urination", "Weak stream", "Flank pain"];
    const musculoskeletalSymptoms = ["Joint pain", "Joint swelling", "Morning stiffness", "Back pain", "Neck pain", "Muscle weakness", "Muscle cramps", "Limited range of motion", "Gait abnormality", "Redness over joints", "Warmth over joints", "Crepitus"];
    const psychologicalNeuroSymptoms = ["Depressed mood", "Anxiety", "Panic attacks", "Obsessive thoughts", "Irrational fear", "Insomnia", "Hallucinations", "Suicidal thoughts", "Poor concentration", "Memory loss", "Confusion", "Mood swings", "Social withdrawal", "Aggression", "Seizures or tremors", "Numbness", "Palpitations"];
    
    // Investigations list
    const generalTests = ["🩸 Complete Blood Count (CBC)", "🧪 Liver Function Test (LFT)", "🧪 Kidney Function Test (RFT)", "🩸 Lipid Profile", "🩸 HbA1c", "🩸 Thyroid Function Test (TFT)", "🩸 Vitamin D", "🩸 Vitamin B12", "🩸 RBG", "🩸 FBG", "🩸 2HPP", "🩸 ESR", "🩸 CRP", "🧪 Serum Electrolytes", "🩸 Blood Culture"];
    const specialTests = ["🦠 ICT Enterica", "🦠 Widal Enterica", "🦠 Widal Brucellosis", "🦠 MAT", "🧫 BFFM", "🔬 Urinalysis (UG)", "🔬 SG", "🧫 Urine Culture", "🔬 Allergy Testing", "🧬 Genetic Testing"];
    const imagingTests = ["📷 Chest X-Ray", "📷 Abdominopelvic U/S", "🧠 CT Scan", "🧠 MRI", "🦴 DEXA Scan", "💨 Pulmonary Function Test (PFT)", "📷 MRI Joint", "📷 Ultrasound Joint"];
    const cardiacTests = ["📊 ECG", "📈 Echocardiogram", "🫀 Cardiac Stress Test", "🩸 Cardiac Enzymes", "🩸 Troponin"];
    const neurologicalTests = ["🧠 EEG", "🧠 Nerve Conduction Study", "🧠 EMG", "🧠 MRI Brain"];
    const investigationsList = [...generalTests, ...specialTests, ...imagingTests, ...cardiacTests, ...neurologicalTests];
    
    const chronicDiseases = [
        "Hypertension", "Diabetes Mellitus", "Heart Disease", "Asthma", "COPD", "Epilepsy", "Migraine", 
        "Thyroid Disorder", "Kidney Disease", "Liver Disease", "Cancer", "Arthritis", "Stroke history"
    ];
    
    // Default drug list
    let drugOptions = [
        "Amoxicillin", "Co-amoxiclav", "Azithromycin", "Ciprofloxacin", "Doxycycline", "Metronidazole",
        "Paracetamol", "Ibuprofen", "Aspirin", "Metformin", "Gliclazide", "Insulin", "Amlodipine",
        "Ramipril", "Losartan", "Bisoprolol", "Atenolol", "Furosemide", "Simvastatin", "Atorvastatin",
        "Clopidogrel", "Warfarin", "Apixaban", "Salbutamol", "Prednisolone", "Fluoxetine", "Sertraline",
        "Diazepam", "Omeprazole", "Ondansetron"
    ];
    
    let patientsArray = [];
    let currentEditPatientId = null;
    let deferredPrompt = null;
    
    // ======================= PWA Installation =======================
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installButton').style.display = 'block';
    });
    
    document.getElementById('installButton').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                console.log('User accepted the install prompt');
            }
            deferredPrompt = null;
            document.getElementById('installButton').style.display = 'none';
        }
    });
    
    // ======================= Load/Save Data =======================
    function loadData() {
        let saved = localStorage.getItem('khayalPatients');
        if(saved) {
            patientsArray = JSON.parse(saved);
        } else {
            patientsArray = [];
        }
        
        let savedDrugs = localStorage.getItem('customDrugsList');
        if(savedDrugs) {
            let customDrugs = JSON.parse(savedDrugs);
            drugOptions = [...new Set([...drugOptions, ...customDrugs])];
        }
        updateDrugDatalist();
        renderFullPatientsList();
    }
    
    function saveNewDrug(drugName) {
        if(!drugName || drugName.trim() === "") return;
        let trimmed = drugName.trim();
        if(!drugOptions.includes(trimmed)) {
            drugOptions.push(trimmed);
            drugOptions.sort();
            let defaultDrugs = ["Amoxicillin", "Co-amoxiclav", "Azithromycin", "Ciprofloxacin", "Doxycycline", "Metronidazole",
                "Paracetamol", "Ibuprofen", "Aspirin", "Metformin", "Gliclazide", "Insulin", "Amlodipine",
                "Ramipril", "Losartan", "Bisoprolol", "Atenolol", "Furosemide", "Simvastatin", "Atorvastatin",
                "Clopidogrel", "Warfarin", "Apixaban", "Salbutamol", "Prednisolone", "Fluoxetine", "Sertraline",
                "Diazepam", "Omeprazole", "Ondansetron"];
            let customDrugs = drugOptions.filter(d => !defaultDrugs.includes(d));
            localStorage.setItem('customDrugsList', JSON.stringify(customDrugs));
            updateDrugDatalist();
        }
    }
    
    function updateDrugDatalist() {
        let datalist = document.getElementById('drugList');
        if(datalist) {
            datalist.innerHTML = drugOptions.map(d => `<option value="${d}">${d}</option>`).join('');
        }
    }
    
    // ======================= BARCODE =======================
    function updateBarcode(fileNo) {
        let barcodeTextSpan = document.getElementById('barcodeFileNo');
        if(barcodeTextSpan) barcodeTextSpan.innerText = fileNo;
        try {
            JsBarcode("#barcode", fileNo, {
                format: "CODE128",
                lineColor: "#0a2f28",
                width: 2,
                height: 50,
                displayValue: false,
                margin: 5
            });
        } catch(e) {}
    }
    
    // ======================= BUILD UI =======================
    function buildHpiCheckboxes() {
        let container = document.getElementById('hpiContainer');
        if(!container) return;
        let saved = localStorage.getItem('tempHpiState');
        let checkedState = saved ? JSON.parse(saved) : {};
        let html = `
            <div><strong>🔹 General:</strong></div><div class="checkbox-grid">${generalSymptoms.map(s => `<label><input type="checkbox" value="${s}" ${checkedState[s]?'checked':''}> ${s}</label>`).join('')}</div>
            <div style="margin-top:12px;"><strong>🔹 Respiratory:</strong></div><div class="checkbox-grid">${respiratorySymptoms.map(s => `<label><input type="checkbox" value="${s}" ${checkedState[s]?'checked':''}> ${s}</label>`).join('')}</div>
            <div style="margin-top:12px;"><strong>🔹 Digestive:</strong></div><div class="checkbox-grid">${digestiveSymptoms.map(s => `<label><input type="checkbox" value="${s}" ${checkedState[s]?'checked':''}> ${s}</label>`).join('')}</div>
            <div style="margin-top:12px;"><strong>🔹 Urinary:</strong></div><div class="checkbox-grid">${urinarySymptoms.map(s => `<label><input type="checkbox" value="${s}" ${checkedState[s]?'checked':''}> ${s}</label>`).join('')}</div>
            <div style="margin-top:12px;"><strong>🔹 Musculoskeletal:</strong></div><div class="checkbox-grid">${musculoskeletalSymptoms.map(s => `<label><input type="checkbox" value="${s}" ${checkedState[s]?'checked':''}> ${s}</label>`).join('')}</div>
            <div style="margin-top:12px;"><strong>🔹 Psychological & Neurological:</strong></div><div class="checkbox-grid">${psychologicalNeuroSymptoms.map(s => `<label><input type="checkbox" value="${s}" ${checkedState[s]?'checked':''}> ${s}</label>`).join('')}</div>
        `;
        container.innerHTML = html;
        let checkboxes = container.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => cb.addEventListener('change', () => {
            let state = {}; checkboxes.forEach(ch => { state[ch.value] = ch.checked; });
            localStorage.setItem('tempHpiState', JSON.stringify(state));
        }));
    }
    
    function buildInvestigationsCheckboxes() {
        let container = document.getElementById('investigationsContainer');
        if(!container) return;
        let saved = localStorage.getItem('tempInvestigationsState');
        let checkedState = saved ? JSON.parse(saved) : {};
        let html = `<div class="checkbox-grid">`;
        investigationsList.forEach(inv => { html += `<label><input type="checkbox" value="${inv}" ${checkedState[inv]?'checked':''}> ${inv}</label>`; });
        html += `</div>`;
        container.innerHTML = html;
        let checkboxes = container.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => cb.addEventListener('change', () => {
            let state = {}; checkboxes.forEach(ch => { state[ch.value] = ch.checked; });
            localStorage.setItem('tempInvestigationsState', JSON.stringify(state));
        }));
    }
    
    function buildPmhCheckboxes() {
        let container = document.getElementById('pmhContainer');
        if(!container) return;
        let saved = localStorage.getItem('tempPmhState');
        let checkedState = saved ? JSON.parse(saved) : {};
        let html = chronicDiseases.map(d => `<label><input type="checkbox" value="${d}" ${checkedState[d]?'checked':''}> ${d}</label>`).join('');
        container.innerHTML = html;
        let checkboxes = container.querySelectorAll('#pmhContainer input[type="checkbox"]');
        checkboxes.forEach(cb => cb.addEventListener('change', () => { if(cb.checked) document.getElementById('pmhNoCheckbox').checked = false; savePmhState(); }));
        document.getElementById('pmhNoCheckbox').onchange = (e) => { if(e.target.checked) checkboxes.forEach(cb => cb.checked = false); savePmhState(); };
    }
    
    function savePmhState() { let state={}; document.querySelectorAll('#pmhContainer input[type="checkbox"]').forEach(cb => state[cb.value]=cb.checked); localStorage.setItem('tempPmhState', JSON.stringify(state)); }
    function getPmhChecked() { let state={}; document.querySelectorAll('#pmhContainer input[type="checkbox"]').forEach(cb => state[cb.value]=cb.checked); return state; }
    function getHpiChecked() { let state={}; document.querySelectorAll('#hpiContainer input[type="checkbox"]').forEach(cb => state[cb.value]=cb.checked); return state; }
    function getInvestigationsChecked() { let state={}; document.querySelectorAll('#investigationsContainer input[type="checkbox"]').forEach(cb => state[cb.value]=cb.checked); return state; }
    
    function getTreatmentRows() { 
        let rows=[]; 
        document.querySelectorAll('#treatmentTableBody tr').forEach(row => { 
            let drug = row.querySelector('.drug-name')?.value || ""; 
            let dose = row.querySelector('.drug-dose')?.value || ""; 
            let duration = row.querySelector('.drug-duration')?.value || ""; 
            if(drug.trim()) rows.push({ drug, dose, duration }); 
        }); 
        return rows; 
    }
    
    function addTreatmentRow(d="", ds="", dur="") { 
        let tbody=document.getElementById('treatmentTableBody'); 
        let row=tbody.insertRow(); 
        let drugInput = document.createElement('input');
        drugInput.type = 'text';
        drugInput.className = 'drug-name';
        drugInput.value = d;
        drugInput.setAttribute('list', 'drugList');
        drugInput.addEventListener('blur', function() {
            if(this.value.trim() && !drugOptions.includes(this.value.trim())) {
                saveNewDrug(this.value.trim());
            }
        });
        let drugCell = row.insertCell(0);
        drugCell.appendChild(drugInput);
        row.insertCell(1).innerHTML = `<input type="text" class="drug-dose" value="${ds.replace(/"/g,'&quot;')}">`;
        row.insertCell(2).innerHTML = `<input type="text" class="drug-duration" value="${dur.replace(/"/g,'&quot;')}">`;
        row.insertCell(3).innerHTML = `<button type="button" class="remove-row-btn" onclick="this.closest('tr').remove()">✖️ Remove</button>`;
    }
    
    function clearTreatmentTable() { 
        let tbody = document.getElementById('treatmentTableBody');
        if(tbody) tbody.innerHTML = ''; 
        addTreatmentRow(); 
    }
    
    function generateFileNumber() { 
        let max = 0; 
        patientsArray.forEach(p => { 
            let match = p.fileNo.match(/\d+/);
            if(match) {
                let n = parseInt(match[0]); 
                if(!isNaN(n) && n > max) max = n; 
            }
        }); 
        return `KHC-${String(max + 1).padStart(4, '0')}`; 
    }
    
    function resetFileNoToDefault() {
        let defaultNo = "KHC-0001";
        document.getElementById('fileNumberDisplay').innerText = defaultNo;
        updateBarcode(defaultNo);
    }
    
    function updateFileNumberDisplay(fileNo) {
        document.getElementById('fileNumberDisplay').innerText = fileNo;
        updateBarcode(fileNo);
    }
    
    function clearVisitForm() {
        localStorage.removeItem('tempHpiState'); 
        localStorage.removeItem('tempPmhState'); 
        localStorage.removeItem('tempInvestigationsState');
        buildHpiCheckboxes(); 
        buildPmhCheckboxes(); 
        buildInvestigationsCheckboxes();
        document.getElementById('otherCO').value = ""; 
        document.getElementById('fhDetails').value = ""; 
        document.getElementById('dhDetails').value = "";
        document.getElementById('otherInvestigation').value = "";
        document.querySelectorAll('input[name="fhExist"]')[1].checked = true; 
        document.querySelectorAll('input[name="dhExist"]')[1].checked = true;
        document.getElementById('investFile').value = ""; 
        document.getElementById('fileNameDisplay').innerHTML = "";
        clearTreatmentTable();
    }
    
    function clearDemographics() { 
        document.getElementById('date').value = ""; 
        document.getElementById('name').value = ""; 
        document.getElementById('age').value = ""; 
        document.getElementById('address').value = ""; 
        document.getElementById('marital').value = ""; 
        document.getElementById('job').value = ""; 
        resetFileNoToDefault();
    }
    
    function clearAllData() { 
        if(confirm("Clear all current input fields?")) { 
            clearDemographics(); 
            clearVisitForm(); 
            currentEditPatientId = null; 
        } 
    }
    
    function isStep1Valid() { 
        let d=document.getElementById('date').value; 
        let n=document.getElementById('name').value.trim(); 
        let a=document.getElementById('age').value.trim(); 
        let ad=document.getElementById('address').value.trim(); 
        let m=document.getElementById('marital').value; 
        let j=document.getElementById('job').value; 
        if(!d || !n || !a || !ad || !m || !j) { 
            alert("Please complete all mandatory fields"); 
            return false; 
        } 
        return true; 
    }
    
    function validateAndNext() { 
        if(isStep1Valid()) showStep(2); 
    }
    
    function showStep(s) { 
        document.getElementById('step1').classList.remove('active'); 
        document.getElementById('step2').classList.remove('active'); 
        document.getElementById('step3').classList.remove('active'); 
        if(s===1) document.getElementById('step1').classList.add('active'); 
        if(s===2) document.getElementById('step2').classList.add('active'); 
        if(s===3) document.getElementById('step3').classList.add('active'); 
    }
    
    function nextStep(s) { showStep(s); } 
    function prevStep(s) { showStep(s); }
    
    async function saveCurrentVisit() {
        if(!isStep1Valid()) { 
            showStep(1); 
            return; 
        }
        
        let name = document.getElementById('name').value.trim();
        let age = document.getElementById('age').value;
        let address = document.getElementById('address').value;
        let marital = document.getElementById('marital').value;
        let job = document.getElementById('job').value;
        let date = document.getElementById('date').value;
        let fileNo = document.getElementById('fileNumberDisplay').innerText;
        
        if(fileNo === "KHC-0001" && patientsArray.length > 0) {
            fileNo = generateFileNumber();
            updateFileNumberDisplay(fileNo);
        }
        
        let hpi = getHpiChecked();
        let otherCO = document.getElementById('otherCO').value;
        let pmhObj = getPmhChecked();
        let fhExist = document.querySelector('input[name="fhExist"]:checked')?.value || "No";
        let fhDetails = document.getElementById('fhDetails').value;
        let dhExist = document.querySelector('input[name="dhExist"]:checked')?.value || "No";
        let dhDetails = document.getElementById('dhDetails').value;
        let investigations = getInvestigationsChecked();
        let otherInvestigation = document.getElementById('otherInvestigation').value;
        let treatment = getTreatmentRows();
        
        let fileBase64 = "";
        let fileName = "";
        let fileInput = document.getElementById('investFile');
        if(fileInput.files.length > 0) {
            fileName = fileInput.files[0].name;
            fileBase64 = await new Promise((resolve) => {
                let reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            });
        }
        
        let visit = {
            visitId: Date.now(),
            visitDate: date,
            hpi: hpi,
            otherCO: otherCO,
            pmh: pmhObj,
            fhExist: fhExist,
            fhDetails: fhDetails,
            dhExist: dhExist,
            dhDetails: dhDetails,
            investigations: investigations,
            otherInvestigation: otherInvestigation,
            treatment: treatment,
            hasFile: (fileBase64 !== ""),
            fileBase64: fileBase64,
            fileName: fileName
        };
        
        if(currentEditPatientId) {
            let patient = patientsArray.find(p => p.id === currentEditPatientId);
            if(patient) {
                if(!patient.visits) patient.visits = [];
                patient.visits.unshift(visit);
                patient.visits.sort((a,b) => new Date(b.visitDate) - new Date(a.visitDate));
                patient.name = name;
                patient.age = age;
                patient.address = address;
                patient.marital = marital;
                patient.job = job;
                patient.fileNo = fileNo;
                localStorage.setItem('khayalPatients', JSON.stringify(patientsArray));
                alert(`New visit added for ${name}`);
            }
        } else {
            let newPatient = {
                id: Date.now(),
                fileNo: fileNo,
                name: name,
                age: age,
                address: address,
                marital: marital,
                job: job,
                visits: [visit]
            };
            patientsArray.unshift(newPatient);
            localStorage.setItem('khayalPatients', JSON.stringify(patientsArray));
            alert(`New patient ${name} saved with file number ${fileNo}`);
        }
        
        clearDemographics();
        clearVisitForm();
        currentEditPatientId = null;
        showStep(1);
        renderFullPatientsList();
        
        let newFileNo = generateFileNumber();
        updateFileNumberDisplay(newFileNo);
    }
    
    function editPatient(id) { 
        let p = patientsArray.find(p => p.id === id); 
        if(!p) return; 
        currentEditPatientId = id; 
        document.getElementById('name').value = p.name; 
        document.getElementById('age').value = p.age; 
        document.getElementById('address').value = p.address; 
        document.getElementById('marital').value = p.marital; 
        document.getElementById('job').value = p.job; 
        document.getElementById('date').value = new Date().toISOString().slice(0,10); 
        updateFileNumberDisplay(p.fileNo); 
        clearVisitForm(); 
        showMainPage(); 
        showStep(1); 
        alert(`Editing ${p.name} - Add follow-up visit`); 
    }
    
    function deletePatient(id) { 
        if(confirm("Delete patient permanently?")) { 
            patientsArray = patientsArray.filter(p => p.id !== id); 
            localStorage.setItem('khayalPatients', JSON.stringify(patientsArray)); 
            renderFullPatientsList(); 
            if(currentEditPatientId === id) { 
                clearDemographics(); 
                clearVisitForm(); 
                currentEditPatientId = null; 
                showStep(1); 
            } 
            alert("Patient deleted"); 
        } 
    }
    
    function renderFullPatientsList() {
        let term = document.getElementById('globalSearch')?.value.toLowerCase() || "";
        let filtered = patientsArray.filter(p => p.name.toLowerCase().includes(term) || p.fileNo.toLowerCase().includes(term) || (p.visits && p.visits.some(v => v.visitDate.includes(term))));
        let container = document.getElementById('fullPatientsList');
        if(filtered.length === 0) { 
            container.innerHTML = '<div style="padding:20px; text-align:center;">No patients found</div>'; 
            return; 
        }
        let html = '';
        filtered.forEach((p, index) => {
            let barcodeId = `barcode_card_${p.id}_${index}`;
            html += `<div class="patient-card">
                        <div class="patient-barcode">
                            <div class="id-label">ID: ${p.fileNo}</div>
                            <svg id="${barcodeId}"></svg>
                        </div>
                        <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
                            <div><strong>👤 ${p.name} (${p.age}) | 🏠 ${p.address}</strong><div style="font-size:11px; color:#666;">💍 ${p.marital} | 💼 ${p.job}</div></div>
                            <div><button class="icon-btn" onclick="editPatient(${p.id})" title="Add New Visit">✏️ ADD VISIT</button><button class="icon-btn" onclick="deletePatient(${p.id})" style="color:#b3413b;" title="Delete Patient">🗑️ DELETE</button></div>
                        </div>
                        <div><strong>📋 VISITS (${p.visits?.length || 0})</strong></div>`;
            if(p.visits) {
                p.visits.sort((a,b) => new Date(b.visitDate) - new Date(a.visitDate)).forEach(v => {
                    let hpiShort = Object.keys(v.hpi || {}).filter(k => v.hpi[k]).slice(0,4).join(', ');
                    let treatmentShort = v.treatment?.map(t => t.drug).slice(0,2).join(', ') || 'None';
                    let investigationsShort = Object.keys(v.investigations || {}).filter(k => v.investigations[k]).slice(0,3).join(', ') || 'None';
                    html += `<div class="visit-card"><strong>📅 ${v.visitDate}</strong><br>
                            <b>HPI:</b> ${hpiShort || 'None'}${Object.keys(v.hpi || {}).length > 4 ? '...' : ''}<br>
                            <b>Treatment:</b> ${treatmentShort}<br>
                            <b>Investigations:</b> ${investigationsShort}<br>`;
                    if(v.hasFile && v.fileBase64) {
                        html += `<div style="margin-top:8px;"><a href="${v.fileBase64}" download="${v.fileName || 'attachment'}" target="_blank" class="file-link">📎 View/Download File</a></div>`;
                    }
                    html += `<details><summary>🔍 Full Details</summary>
                            <b>Other C/O:</b> ${v.otherCO || '-'}<br>
                            <b>Past Medical History:</b> ${Object.keys(v.pmh || {}).filter(k => v.pmh[k]).join(', ') || 'None'}<br>
                            <b>Family History:</b> ${v.fhExist} ${v.fhDetails ? '- ' + v.fhDetails : ''}<br>
                            <b>Drugs History:</b> ${v.dhExist} ${v.dhDetails ? '- ' + v.dhDetails : ''}<br>
                            <b>Investigations Full:</b> ${Object.keys(v.investigations || {}).filter(k => v.investigations[k]).join(', ') || 'None'}<br>
                            <b>Other Investigation:</b> ${v.otherInvestigation || '-'}<br>
                            <b>Treatment Table:</b><br> ${v.treatment?.map(t => `• ${t.drug} - ${t.dose} for ${t.duration}`).join('<br>') || '-'}<br>
                            </details></div>`;
                });
            }
            html += `</div>`;
            setTimeout(() => {
                try {
                    JsBarcode(`#${barcodeId}`, p.fileNo, {
                        format: "CODE128",
                        lineColor: "#1e5a4c",
                        width: 1.5,
                        height: 35,
                        displayValue: false,
                        margin: 2
                    });
                } catch(e) {}
            }, 10);
        });
        container.innerHTML = html;
    }
    
    function showSearchPage() { 
        document.getElementById('mainPage').classList.remove('active-page'); 
        document.getElementById('searchPage').classList.add('active-page'); 
        renderFullPatientsList(); 
    }
    
    function showMainPage() { 
        document.getElementById('searchPage').classList.remove('active-page'); 
        document.getElementById('mainPage').classList.add('active-page'); 
    }
    
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Service Worker registered');
            }).catch(err => {
                console.log('Service Worker registration failed:', err);
            });
        });
    }
    
    // Online/Offline detection
    window.addEventListener('online', () => {
        document.getElementById('offlineBadge').style.display = 'none';
    });
    
    window.addEventListener('offline', () => {
        document.getElementById('offlineBadge').style.display = 'block';
    });
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        buildHpiCheckboxes(); 
        buildPmhCheckboxes(); 
        buildInvestigationsCheckboxes();
        document.getElementById('date').value = new Date().toISOString().slice(0,10);
        resetFileNoToDefault();
        clearTreatmentTable();
        document.getElementById('investFile').onchange = (e) => {
            document.getElementById('fileNameDisplay').innerHTML = e.target.files.length ? "📎 " + e.target.files[0].name : "";
        };
    });
</script>
</body>
</html>
